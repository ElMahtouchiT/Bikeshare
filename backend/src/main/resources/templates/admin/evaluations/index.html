<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Évaluations — Admin BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0">Évaluations</h2>
      <p class="text-muted mb-0 small">
        <span th:text="${dashboard.totalEvaluations}">0</span> avis —
        Moyenne globale :
        <strong th:text="${#numbers.formatDecimal(dashboard.averageNote, 1, 1)} + '/5'">0/5</strong>
      </p>
    </div>
    <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${evaluations.isEmpty()}" class="alert alert-info">Aucune évaluation.</div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden" th:unless="${evaluations.isEmpty()}">
    <table class="table table-hover align-middle mb-0">
      <thead style="background:#13233f;" class="text-white">
        <tr>
          <th class="px-3">Vélo</th>
          <th>Auteur</th>
          <th>Note</th>
          <th>Commentaire</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${evaluations}">
          <td class="px-3" th:text="${e.bikeLabel != null ? e.bikeLabel : '#' + e.bikeId}"></td>
          <td th:text="${e.authorName != null ? e.authorName : '—'}"></td>
          <td>
            <span class="badge"
                  th:classappend="${e.note >= 4} ? 'bg-success' : (${e.note == 3} ? 'bg-warning text-dark' : 'bg-danger')"
                  th:text="${e.note} + '/5'"></span>
          </td>
          <td class="text-muted small" th:text="${e.comment != null ? e.comment : '—'}"></td>
          <td class="text-muted small"
              th:text="${e.createdAt != null ? #temporals.format(e.createdAt, 'dd/MM/yyyy') : '—'}"></td>
          <td>
            <form th:action="@{'/admin/evaluations/' + ${e.id} + '/delete'}" method="post"
                  onsubmit="return confirm('Supprimer cet avis ?')">
              <button class="btn btn-sm btn-outline-danger">🗑</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
