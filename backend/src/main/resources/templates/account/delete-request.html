<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Suppression de compte — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5" style="max-width:560px;">
  <div class="card border-0 rounded-4 shadow-sm p-5 text-center">

    <div class="mb-3" style="font-size:3rem;">⚠️</div>
    <h3 class="text-danger mb-2">Supprimer mon compte</h3>
    <p class="text-muted mb-1">
      Bonjour <strong th:text="${user.firstName}"></strong>,
    </p>
    <p class="text-muted mb-4">
      Cette action est <strong>irréversible</strong>. En confirmant, vous demandez la suppression
      définitive de votre compte, de vos vélos et de toutes vos données personnelles.<br/>
      <span class="text-muted small">Un administrateur traitera votre demande sous <strong>30 jours</strong>.</span>
    </p>

    <div class="d-grid gap-2">
      <form th:action="@{/account/delete-request}" method="post">
        <button type="submit" class="btn btn-danger w-100 py-2">
          Oui, je confirme la suppression de mon compte
        </button>
      </form>
      <a th:href="@{/account/profile}" class="btn btn-outline-secondary py-2">
        Non, annuler et retourner à mon profil
      </a>
    </div>

  </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
