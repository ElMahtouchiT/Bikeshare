<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Mes gains — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Mes gains</h2>
    <a th:href="@{/account}" class="btn btn-outline-secondary btn-sm">&larr; Mon compte</a>
  </div>

  <div th:if="${gains.isEmpty()}" class="alert alert-info">
    Aucun gain enregistré pour le moment.
  </div>

  <div th:if="${!gains.isEmpty()}">
    <div class="card border-0 shadow-sm rounded-4 mb-4 p-3">
      <div class="h4 text-success mb-0"
           th:text="${#aggregates.sum(gains.![amountEarned]) + ' €'}">0 €</div>
      <div class="text-muted">Total des gains</div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Description</th>
            <th>Montant</th>
            <th>Statut</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="g : ${gains}">
            <td th:text="${g.id}"></td>
            <td th:text="${g.description != null ? g.description : '—'}"></td>
            <td class="fw-bold text-success" th:text="${g.amountEarned + ' €'}"></td>
            <td>
              <span class="badge"
                    th:classappend="${g.status == 'TRANSFERRED'} ? 'bg-success' : 'bg-warning text-dark'"
                    th:text="${g.status}"></span>
            </td>
            <td th:text="${g.createdAt != null ? #temporals.format(g.createdAt, 'dd/MM/yyyy') : '—'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
