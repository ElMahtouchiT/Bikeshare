<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Mes réservations — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Mes réservations</h2>
    <a th:href="@{/account}" class="btn btn-outline-secondary btn-sm">&larr; Mon compte</a>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>

  <div th:if="${reservations.isEmpty()}" class="alert alert-info">
    Vous n'avez pas encore de réservation.
  </div>

  <div class="table-responsive" th:if="${!reservations.isEmpty()}">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Vélo</th>
          <th>Du</th>
          <th>Au</th>
          <th>Durée</th>
          <th>Statut</th>
          <th>Prix</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="r : ${reservations}">
          <td th:text="${r.id}"></td>
          <td th:text="${r.bike != null ? r.bike.brand + ' ' + r.bike.model : '—'}"></td>
          <td th:text="${r.startLocation}"></td>
          <td th:text="${r.endLocation}"></td>
          <td th:text="${r.duration != null ? r.duration + ' j' : '—'}"></td>
          <td>
            <span th:if="${r.statut == 'CANCELLED'}" class="badge bg-danger">Annulée</span>
            <span th:if="${r.statut == 'REFUSED'}"   class="badge bg-danger">Refusée</span>
            <span th:if="${r.statut == 'COMPLETED'}" class="badge bg-secondary">Terminée</span>
            <th:block th:if="${r.statut == 'PENDING' or r.statut == 'CONFIRMED' or r.statut == 'NOW'}">
              <span th:if="${r.paid}" class="badge bg-success">Confirmée et payée</span>
              <span th:unless="${r.paid}" class="badge bg-warning text-dark">En attente de paiement</span>
            </th:block>
          </td>
          <td th:text="${r.totalPrice != null ? r.totalPrice + ' €' : '—'}"></td>
          <td class="text-nowrap">
            <a class="btn btn-sm btn-outline-secondary"
               th:href="@{'/account/reservations/' + ${r.id} + '/chat'}">💬</a>
            <!-- Paiement Stripe : bouton si réservation active non payée, sinon badge « payé » -->
            <form th:if="${!r.paid and (r.statut == 'CONFIRMED' or r.statut == 'PENDING' or r.statut == 'NOW')}"
                  th:action="@{'/account/reservations/' + ${r.id} + '/pay'}" method="post" class="d-inline">
              <button type="submit" class="btn btn-sm text-white" style="background:#635bff;">💳 Payer</button>
            </form>
            <!-- Évaluation : bouton si location terminée non évaluée, sinon la note déjà donnée -->
            <a th:if="${r.statut == 'COMPLETED' and r.evaluationNote == null}"
               class="btn btn-sm btn-warning"
               th:href="@{'/account/reservations/' + ${r.id} + '/evaluate'}">⭐ <span th:text="#{eval.action}">Évaluer</span></a>
            <span th:if="${r.evaluationNote != null}" class="badge bg-success"
                  th:text="${r.evaluationNote} + ' ★'">4 ★</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
