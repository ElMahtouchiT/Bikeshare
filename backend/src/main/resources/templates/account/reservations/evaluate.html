<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{eval.title} + ' — BikeShare'">Évaluer ma location — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5" style="max-width:640px">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 th:text="#{eval.title}">Évaluer ma location</h2>
    <a th:href="@{/account/reservations}" class="btn btn-outline-secondary btn-sm">&larr; <span th:text="#{nav.account}">Mon compte</span></a>
  </div>

  <div class="card border-0 shadow-sm rounded-4 p-4">
    <p class="text-muted mb-3">
      <span th:text="#{eval.bike}">Vélo</span> :
      <strong th:text="${reservation.bike != null ? reservation.bike.brand + ' ' + reservation.bike.model : '—'}">Trek Marlin 7</strong>
      <span th:if="${reservation.startLocation != null}">
        (<span th:text="${reservation.startLocation}"></span> &rarr; <span th:text="${reservation.endLocation}"></span>)
      </span>
    </p>

    <form th:action="@{'/account/reservations/' + ${reservation.id} + '/evaluate'}" method="post">
      <label class="form-label" th:text="#{eval.note}">Note</label>
      <select class="form-select mb-3" name="note" required>
        <option value="5">★★★★★ (5)</option>
        <option value="4">★★★★☆ (4)</option>
        <option value="3">★★★☆☆ (3)</option>
        <option value="2">★★☆☆☆ (2)</option>
        <option value="1">★☆☆☆☆ (1)</option>
      </select>

      <label class="form-label" th:text="#{eval.comment}">Commentaire</label>
      <textarea class="form-control mb-3" name="comment" rows="4"
                th:placeholder="#{eval.commentPlaceholder}"></textarea>

      <button class="btn text-white w-100" style="background:#1fa67a;" th:text="#{eval.submit}">Envoyer mon évaluation</button>
    </form>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
