<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Messagerie — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5" style="max-width:720px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-0">Messagerie</h2>
      <p class="text-muted mb-0 small">
        <span th:text="${reservation.bike != null ? reservation.bike.brand + ' ' + reservation.bike.model : 'Vélo'}"></span>
        · avec <strong th:text="${otherName}"></strong>
      </p>
    </div>
    <a th:href="@{/account/reservations}" class="btn btn-outline-secondary btn-sm">&larr; Retour</a>
  </div>

  <div class="card shadow-sm border-0 rounded-4">
    <div id="messages" class="p-3" style="height:420px;overflow-y:auto;background:#f8f9fa;"></div>
    <div class="p-2 border-top d-flex gap-2">
      <input id="msgInput" class="form-control" type="text" placeholder="Écrivez un message…" autocomplete="off"/>
      <button id="sendBtn" class="btn text-white px-4" style="background:#1fa67a;">Envoyer</button>
    </div>
  </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
  const reservationId = [[${reservation.id}]];
  const currentUserId = [[${currentUserId}]];
  const messagesDiv   = document.getElementById('messages');

  function appendMessage(m) {
    const mine = (m.fromUserId === currentUserId);
    const wrap = document.createElement('div');
    wrap.className = 'd-flex mb-2 ' + (mine ? 'justify-content-end' : 'justify-content-start');
    const bubble = document.createElement('div');
    bubble.className = 'px-3 py-2 rounded-4 shadow-sm ' + (mine ? 'text-white' : 'bg-white border');
    if (mine) bubble.style.background = '#1fa67a';
    bubble.style.maxWidth = '75%';
    bubble.textContent = m.content;
    wrap.appendChild(bubble);
    messagesDiv.appendChild(wrap);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Historique
  fetch('/api/messages/reservation/' + reservationId)
    .then(r => r.ok ? r.json() : [])
    .then(list => list.forEach(appendMessage))
    .catch(() => {});

  // Connexion temps réel
  const socket = new SockJS('/ws');
  const stompClient = Stomp.over(socket);
  stompClient.debug = null;
  stompClient.connect({}, function () {
    stompClient.subscribe('/topic/messages/' + reservationId, function (msg) {
      appendMessage(JSON.parse(msg.body));
    });
  });

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !stompClient.connected) return;
    stompClient.send('/app/chat/' + reservationId, {}, JSON.stringify({ content: text }));
    input.value = '';
  }
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('msgInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
