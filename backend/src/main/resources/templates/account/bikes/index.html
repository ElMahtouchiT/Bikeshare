<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Mes vélos — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Mes vélos</h2>
    <div class="d-flex gap-2">
      <a th:href="@{/account/bikes/create}" class="btn btn-sm text-white" style="background:#1fa67a;">+ Proposer un vélo</a>
      <a th:href="@{/account}" class="btn btn-outline-secondary btn-sm">&larr; Mon compte</a>
    </div>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div th:if="${bikes.isEmpty()}" class="alert alert-info">
    Vous n'avez pas encore de vélo enregistré.
    <a th:href="@{/account/bikes/create}" class="alert-link ms-1">Proposez votre premier vélo</a>.
  </div>

  <div class="row g-4" th:if="${!bikes.isEmpty()}">
    <div class="col-md-4" th:each="bike : ${bikes}">
      <div class="card h-100 shadow-sm border-0 rounded-4">
           <img class="card-img-top rounded-top-4" style="height:160px;object-fit:cover;" alt="vélo"
                th:with="type=${bike.bikeType != null ? bike.bikeType.toLowerCase() : 'city'}, n=${bike.id % 9 + 1}, fallback=${'/images/bikes/' + type + n + '.avif'}, imgPath=${(bike.photos != null and !bike.photos.isEmpty()) ? bike.photos[0].url : fallback}"
                th:src="@{${imgPath}}"
                th:attr="data-fallback=@{${fallback}}"
                onerror="if(this.dataset.fb){this.onerror=null;this.src='https://placehold.co/600x400?text=Velo';}else{this.dataset.fb=1;this.src=this.getAttribute('data-fallback');}"/>
        <div class="card-body">
          <h5 class="card-title" th:text="${bike.brand + ' ' + bike.model}"></h5>
          <p class="text-muted mb-1" th:text="${bike.locality}"></p>
          <p class="mb-1">
            <span class="badge" th:classappend="${bike.online} ? 'bg-success' : 'bg-secondary'"
                  th:text="${bike.online} ? 'En ligne' : 'Hors ligne'"></span>
          </p>
          <p class="fw-bold" th:text="${bike.price != null ? bike.price.middlePrice + ' €/jour' : 'Prix non défini'}"></p>
          <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-sm text-white" style="background:#13233f;" th:href="@{'/bikes/' + ${bike.id}}">Voir</a>
            <a class="btn btn-sm btn-outline-secondary" th:href="@{'/account/bikes/' + ${bike.id} + '/edit'}">Modifier</a>
            <form th:action="@{'/account/bikes/' + ${bike.id} + '/delete'}" method="post"
                  onsubmit="return confirm('Supprimer définitivement cette annonce et ses photos ?');">
              <button type="submit" class="btn btn-sm btn-outline-danger">Supprimer</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
