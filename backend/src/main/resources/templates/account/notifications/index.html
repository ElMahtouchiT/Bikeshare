<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{notif.title} + ' — BikeShare'">Mes notifications — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 th:text="#{notif.title}">Mes notifications</h2>
    <a th:href="@{/account}" class="btn btn-outline-secondary btn-sm">&larr; <span th:text="#{nav.account}">Mon compte</span></a>
  </div>

  <div th:if="${notifications == null or notifications.isEmpty()}" class="alert alert-info"
       th:text="#{notif.empty}">Vous n'avez aucune notification.</div>

  <div class="list-group shadow-sm" th:if="${notifications != null and !notifications.isEmpty()}">
    <a th:each="n : ${notifications}"
       th:href="${n.link != null ? n.link : '#'}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-start gap-3"
       th:classappend="${!n.read} ? 'list-group-item-warning' : ''">
      <div>
        <div>
          <span th:switch="${n.type}">
            <span th:case="'MESSAGE'">💬</span>
            <span th:case="'EVALUATION'">⭐</span>
            <span th:case="'RESERVATION'">📅</span>
            <span th:case="*">🔔</span>
          </span>
          <strong th:switch="${n.type}">
            <span th:case="'MESSAGE'" th:text="#{notif.type.MESSAGE}">Nouveau message de</span>
            <span th:case="'EVALUATION'" th:text="#{notif.type.EVALUATION}">Nouvelle évaluation de</span>
            <span th:case="'RESERVATION'" th:text="#{notif.type.RESERVATION}">Nouvelle réservation de</span>
            <span th:case="*" th:text="#{nav.notifications}">Notification</span>
          </strong>
          <span th:if="${n.fromUser != null}"
                th:text="${n.fromUser.firstName + ' ' + n.fromUser.lastName}">Jean Dupont</span>
        </div>
        <div class="text-muted small mt-1" th:if="${n.message != null}" th:text="${n.message}">aperçu…</div>
      </div>
      <div class="text-end text-nowrap">
        <span th:if="${!n.read}" class="badge bg-danger" th:text="#{notif.new}">Nouveau</span>
        <div class="text-muted small mt-1" th:if="${n.createdAt != null}"
             th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</div>
      </div>
    </a>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
