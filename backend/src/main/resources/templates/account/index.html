<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Mon compte — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <h2 th:text="'Bonjour ' + ${user.firstName}">Bonjour</h2>
  <div class="row g-3 mt-2">
    <div class="col-md-4"><div class="card p-3"><div class="h3" th:text="${bikeCount}">0</div><div class="text-muted">Vélos en ligne</div></div></div>
    <div class="col-md-4"><div class="card p-3"><div class="h3" th:text="${confirmedRentalsAsTenant}">0</div><div class="text-muted">Locations confirmées</div></div></div>
    <div class="col-md-4"><div class="card p-3">
      <a class="btn text-white" style="background:#1fa67a;" th:href="@{/account/bikes}">Mes vélos</a>
      <a class="btn btn-outline-secondary mt-2" th:href="@{/account/reservations}">Mes réservations</a>
    </div></div>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
