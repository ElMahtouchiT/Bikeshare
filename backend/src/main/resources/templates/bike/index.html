<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Vélos disponibles — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <h2 class="mb-4">Vélos disponibles</h2>
  <div class="row g-4">
    <div class="col-md-3" th:each="bike : ${bikes}">
      <div class="card h-100 shadow-sm border-0 rounded-4">
           <img class="card-img-top rounded-top-4" style="height:180px;object-fit:cover;" alt="vélo"
                th:with="type=${bike.bikeType != null ? bike.bikeType.toLowerCase() : 'city'}, n=${bike.id % 9 + 1}, hasPhoto=${bike.photos != null and !bike.photos.isEmpty()}"
                th:src="${hasPhoto} ? @{${bike.photos[0].url}} : @{'/images/bikes/' + ${type} + ${n} + '.avif'}"
                onerror="this.onerror=null;this.src='https://placehold.co/600x400?text=Velo';"/>
        <div class="card-body">
          <h6 th:text="${bike.brand + ' ' + bike.model}"></h6>
          <p class="text-muted small mb-1" th:text="${bike.locality}"></p>
          <a class="btn btn-sm text-white" style="background:#13233f;" th:href="@{'/bikes/' + ${bike.id}}">Détail</a>
        </div>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
