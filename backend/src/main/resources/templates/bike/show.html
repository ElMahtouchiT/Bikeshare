<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${bike.brand + ' ' + bike.model} + ' — BikeShare'">Détail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    #map { height: 320px; width: 100%; border-radius: 1rem; }
  </style>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5">
  <a th:href="@{/bikes}" class="text-decoration-none text-muted">&larr; Retour aux vélos</a>

  <div class="row mt-3 g-4">

    <!-- Colonne gauche : infos vélo -->
    <div class="col-md-7">
         <img class="img-fluid rounded-4 shadow-sm w-100" style="max-height:360px;object-fit:cover;" alt="photo du vélo"
              th:with="type=${bike.bikeType != null ? bike.bikeType.toLowerCase() : 'city'}, n=${bike.id % 9 + 1}, fallback=${'/images/bikes/' + type + n + '.avif'}, imgPath=${(bike.photos != null and !bike.photos.isEmpty()) ? bike.photos[0].url : fallback}"
              th:src="@{${imgPath}}"
              th:attr="data-fallback=@{${fallback}}"
              onerror="if(this.dataset.fb){this.onerror=null;this.src='https://placehold.co/600x400?text=Velo';}else{this.dataset.fb=1;this.src=this.getAttribute('data-fallback');}"/>

      <!-- Miniatures (si plusieurs photos uploadées) -->
      <div class="row g-2 mt-1" th:if="${bike.photos != null and bike.photos.size() > 1}">
        <div class="col-3" th:each="photo : ${bike.photos}">
          <img class="img-fluid rounded-3" style="height:80px;width:100%;object-fit:cover;" alt="photo du vélo"
               th:src="@{${photo.url}}"/>
        </div>
      </div>

      <h2 class="mt-3 fw-bold" th:text="${bike.brand + ' ' + bike.model}"></h2>
      <p class="text-muted">
        <span th:text="${bike.category != null ? bike.category.category : ''}"></span>
        <span th:if="${bike.category != null}"> · </span>
        <span th:text="${bike.locality}"></span> ·
        <span class="text-warning fw-bold"
              th:text="${#numbers.formatDecimal(averageRating,1,1)} + ' ★'"></span>
        <span class="text-muted" th:text="' /5'"></span>
      </p>

      <!-- Caractéristiques -->
      <h5 class="mt-4">Caractéristiques</h5>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Type</span><br/>
            <strong th:text="${bike.bikeType != null ? bike.bikeType : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Cadre</span><br/>
            <strong th:text="${bike.frameSize != null ? bike.frameSize : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Roues</span><br/>
            <strong th:text="${bike.wheelSize != null ? bike.wheelSize : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Vitesses</span><br/>
            <strong th:text="${bike.gears != null ? bike.gears : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Électrique</span><br/>
            <strong th:text="${bike.electric} ? 'Oui ⚡' : 'Non'"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Mode réservation</span><br/>
            <strong th:text="${bike.reservationMode != null ? bike.reservationMode : '—'}"></strong>
          </div>
        </div>
      </div>

      <!-- Équipements -->
      <h5>Équipements</h5>
      <div class="mb-3">
        <span th:if="${bike.equipments.isEmpty()}" class="text-muted small">Aucun équipement renseigné.</span>
        <span class="badge bg-secondary me-1 mb-1"
              th:each="e : ${bike.equipments}"
              th:text="${e.description}"></span>
      </div>

      <!-- Carte Google Maps -->
      <h5 class="mt-4">Localisation</h5>
      <div th:if="${googleMapsApiKey != null and !googleMapsApiKey.isEmpty() and !googleMapsApiKey.equals('your_google_maps_key')}">

        <!-- Cas 1 : coordonnées GPS disponibles → carte interactive -->
        <div th:if="${bike.latitude != null and bike.longitude != null}">
          <div id="map" class="shadow-sm mb-3"></div>
          <p class="text-muted small">
            📍 <span th:text="${bike.adresse + ', ' + bike.postalCode + ' ' + bike.locality}"></span>
          </p>
          <script th:inline="javascript">
            function initMap() {
              const lat = [[${bike.latitude}]];
              const lng = [[${bike.longitude}]];
              const pos = { lat: lat, lng: lng };
              const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 15, center: pos,
                mapTypeControl: false, streetViewControl: false
              });
              new google.maps.Marker({
                position: pos, map: map,
                title: [[${bike.brand + ' ' + bike.model}]],
                icon: {
                  url: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
                }
              });
            }
          </script>
          <script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&callback=initMap'}"
                  async defer></script>
        </div>

        <!-- Cas 2 : pas de GPS → embed par adresse -->
        <div th:unless="${bike.latitude != null and bike.longitude != null}">
          <iframe class="shadow-sm mb-3" style="height:320px;width:100%;border-radius:1rem;border:0;"
                  loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"
                  th:src="@{'https://www.google.com/maps/embed/v1/place?key=' + ${googleMapsApiKey} + '&q=' + ${bike.adresse + ' ' + bike.locality + ' Belgium'}}">
          </iframe>
        </div>
      </div>

      <!-- Fallback : pas de clé API -->
      <div th:unless="${googleMapsApiKey != null and !googleMapsApiKey.isEmpty() and !googleMapsApiKey.equals('your_google_maps_key')}"
           class="bg-light rounded-4 p-3 text-muted small mb-3">
        📍 <span th:text="${bike.adresse + ', ' + bike.postalCode + ' ' + bike.locality}"></span>
      </div>

      <!-- Évaluations -->
      <h5 class="mt-4">Évaluations</h5>
      <div th:if="${evaluations.isEmpty()}" class="text-muted small">Aucune évaluation pour ce vélo.</div>
      <div th:each="e : ${evaluations}" class="border-bottom py-2">
        <div class="d-flex justify-content-between">
          <strong th:text="${e.authorName != null ? e.authorName : 'Anonyme'}"></strong>
          <span class="text-warning" th:text="${e.note} + ' ★'"></span>
        </div>
        <p class="mb-0 text-muted small" th:text="${e.comment}"></p>
      </div>
    </div>

    <!-- Colonne droite : réservation -->
    <div class="col-md-5">
      <div class="card shadow-sm border-0 rounded-4 p-4 sticky-top" style="top:20px;">
        <h4 class="fw-bold text-success"
            th:text="${bike.price != null ? bike.price.middlePrice + ' €/jour' : 'Prix non défini'}"></h4>

        <div th:if="${bike.price != null and bike.price.promo1 != null}" class="text-muted small mb-2">
          🎉 <span th:text="'Réduction de ' + ${bike.price.promo1} + '% à partir de 3 jours'"></span>
        </div>
        <div th:if="${bike.price != null and bike.price.promo2 != null}" class="text-muted small mb-2">
          🎉 <span th:text="'Réduction de ' + ${bike.price.promo2} + '% à partir de 7 jours'"></span>
        </div>

        <hr/>

        <p class="text-muted small mb-3">
          Propriétaire :
          <strong th:text="${bike.user != null ? bike.user.firstName + ' ' + bike.user.lastName : '—'}"></strong>
        </p>

        <form th:action="@{/reservations}" method="post">
          <input type="hidden" name="bikeId" th:value="${bike.id}"/>
          <label class="form-label fw-semibold">Du</label>
          <input class="form-control mb-2" type="date" name="start"
                 th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required/>
          <label class="form-label fw-semibold">Au</label>
          <input class="form-control mb-3" type="date" name="end"
                 th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required/>
          <th:block sec:authorize="isAuthenticated()">
            <button class="btn text-white w-100 py-2 fw-bold"
                    style="background:#1fa67a;">Réserver ce vélo</button>
          </th:block>
          <th:block sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="btn btn-outline-secondary w-100 py-2">
              Se connecter pour réserver
            </a>
          </th:block>
        </form>
      </div>
    </div>

  </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
