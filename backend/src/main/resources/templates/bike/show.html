<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${bike.brand + ' ' + bike.model} + ' — BikeShare'">Détail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet"/>
  <style>
    #map { height: 320px; width: 100%; border-radius: 1rem; }
    /* Jours disponibles en vert */
    .flatpickr-day:not(.flatpickr-disabled):not(.prevMonthDay):not(.nextMonthDay):not(.flatpickr-selected):not(.today) {
      background:#e6f7f0; border-color:#cdeede; color:#0f5132;
    }
    .flatpickr-day:not(.flatpickr-disabled):hover { background:#1fa67a; color:#fff; }
    /* Jours réservés grisés */
    .flatpickr-day.flatpickr-disabled,
    .flatpickr-day.flatpickr-disabled:hover {
      background:#f1f1f1; color:#c4c4c4; text-decoration:line-through; cursor:not-allowed;
    }
    .legend-swatch { display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:middle; margin-right:4px; }
    .legend-free   { background:#e6f7f0; border:1px solid #cdeede; }
    .legend-booked { background:#f1f1f1; border:1px solid #e0e0e0; }
  </style>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5">
  <a th:href="@{/bikes}" class="text-decoration-none text-muted">&larr; Retour aux vélos</a>

  <div class="row mt-3 g-4">

    <!-- Colonne gauche : infos vélo -->
    <div class="col-md-7">
      <!-- Galerie photos : image principale + navigation -->
      <div class="position-relative">
        <img id="galleryMain" class="img-fluid rounded-4 shadow-sm w-100" style="height:360px;object-fit:cover;" alt="photo du vélo"
             th:src="@{${galleryUrls[0]}}"
             onerror="this.onerror=null;this.src='https://placehold.co/600x400?text=Velo';"/>
        <th:block th:if="${galleryUrls.size() > 1}">
          <button type="button" class="btn btn-light rounded-circle shadow position-absolute top-50 start-0 translate-middle-y ms-2 fw-bold px-3"
                  onclick="galleryStep(-1)" aria-label="Photo précédente">&lsaquo;</button>
          <button type="button" class="btn btn-light rounded-circle shadow position-absolute top-50 end-0 translate-middle-y me-2 fw-bold px-3"
                  onclick="galleryStep(1)" aria-label="Photo suivante">&rsaquo;</button>
          <span id="galleryCounter" class="position-absolute bottom-0 end-0 m-2 badge bg-dark bg-opacity-75">1/1</span>
        </th:block>
      </div>

      <!-- Miniatures cliquables -->
      <div class="d-flex flex-wrap gap-2 mt-2" th:if="${galleryUrls.size() > 1}">
        <img th:each="url,iter : ${galleryUrls}" class="gallery-thumb rounded-3" alt="miniature"
             style="height:64px;width:88px;object-fit:cover;cursor:pointer;border:2px solid transparent;"
             th:src="@{${url}}" th:attr="data-index=${iter.index}"
             onclick="gallerySelect(this)"
             onerror="this.onerror=null;this.src='https://placehold.co/200x150?text=Velo';"/>
      </div>

      <h2 class="mt-3 fw-bold" th:text="${bike.brand + ' ' + bike.model}"></h2>
      <p class="text-muted">
        <span th:text="${bike.category != null ? bike.category.category : ''}"></span>
        <span th:if="${bike.category != null}"> · </span>
        <span th:text="${bike.locality}"></span> ·
        <span class="text-warning fw-bold"
              th:text="${#numbers.formatDecimal(averageRating,1,1)} + ' ★'"></span>
        <span class="text-muted" th:text="' /5'"></span>
      </p>

      <!-- Caractéristiques -->
      <h5 class="mt-4">Caractéristiques</h5>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Type</span><br/>
            <strong th:text="${bike.bikeType != null ? bike.bikeType : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Cadre</span><br/>
            <strong th:text="${bike.frameSize != null ? bike.frameSize : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Roues</span><br/>
            <strong th:text="${bike.wheelSize != null ? bike.wheelSize : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Vitesses</span><br/>
            <strong th:text="${bike.gears != null ? bike.gears : '—'}"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Électrique</span><br/>
            <strong th:text="${bike.electric} ? 'Oui ⚡' : 'Non'"></strong>
          </div>
        </div>
        <div class="col-6">
          <div class="bg-light rounded-3 p-2 small">
            <span class="text-muted">Mode réservation</span><br/>
            <strong th:text="${bike.reservationMode != null ? bike.reservationMode : '—'}"></strong>
          </div>
        </div>
      </div>

      <!-- Équipements -->
      <h5>Équipements</h5>
      <div class="mb-3">
        <span th:if="${bike.equipments.isEmpty()}" class="text-muted small">Aucun équipement renseigné.</span>
        <span class="badge bg-secondary me-1 mb-1"
              th:each="e : ${bike.equipments}"
              th:text="${e.description}"></span>
      </div>

      <!-- Carte Google Maps -->
      <h5 class="mt-4">Localisation</h5>
      <div th:if="${googleMapsApiKey != null and !googleMapsApiKey.isEmpty() and !googleMapsApiKey.equals('your_google_maps_key')}">

        <!-- Cas 1 : coordonnées GPS disponibles → carte interactive -->
        <div th:if="${bike.latitude != null and bike.longitude != null}">
          <div id="map" class="shadow-sm mb-3"></div>
          <p class="text-muted small">
            📍 <span th:text="${bike.adresse + ', ' + bike.postalCode + ' ' + bike.locality}"></span>
          </p>
          <script th:inline="javascript">
            function initMap() {
              const lat = [[${bike.latitude}]];
              const lng = [[${bike.longitude}]];
              const pos = { lat: lat, lng: lng };
              const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 15, center: pos,
                mapTypeControl: false, streetViewControl: false
              });
              new google.maps.Marker({
                position: pos, map: map,
                title: [[${bike.brand + ' ' + bike.model}]],
                icon: {
                  url: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
                }
              });
            }
          </script>
          <script th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&callback=initMap'}"
                  async defer></script>
        </div>

        <!-- Cas 2 : pas de GPS → embed par adresse -->
        <div th:unless="${bike.latitude != null and bike.longitude != null}">
          <iframe class="shadow-sm mb-3" style="height:320px;width:100%;border-radius:1rem;border:0;"
                  loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"
                  th:src="@{'https://www.google.com/maps/embed/v1/place?key=' + ${googleMapsApiKey} + '&q=' + ${bike.adresse + ' ' + bike.locality + ' Belgium'}}">
          </iframe>
        </div>
      </div>

      <!-- Fallback : pas de clé API -->
      <div th:unless="${googleMapsApiKey != null and !googleMapsApiKey.isEmpty() and !googleMapsApiKey.equals('your_google_maps_key')}"
           class="bg-light rounded-4 p-3 text-muted small mb-3">
        📍 <span th:text="${bike.adresse + ', ' + bike.postalCode + ' ' + bike.locality}"></span>
      </div>

      <!-- Évaluations -->
      <h5 class="mt-4">Évaluations</h5>
      <div th:if="${evaluations.isEmpty()}" class="text-muted small">Aucune évaluation pour ce vélo.</div>
      <div th:each="e : ${evaluations}" class="border-bottom py-2">
        <div class="d-flex justify-content-between">
          <strong th:text="${e.authorName != null ? e.authorName : 'Anonyme'}"></strong>
          <span class="text-warning" th:text="${e.note} + ' ★'"></span>
        </div>
        <p class="mb-0 text-muted small" th:text="${e.comment}"></p>
      </div>
    </div>

    <!-- Colonne droite : réservation -->
    <div class="col-md-5">
      <div class="card shadow-sm border-0 rounded-4 p-4 sticky-top" style="top:20px;">
        <h4 class="fw-bold text-success"
            th:text="${bike.price != null ? bike.price.middlePrice + ' €/jour' : 'Prix non défini'}"></h4>

        <div th:if="${bike.price != null and bike.price.promo1 != null}" class="text-muted small mb-2">
          🎉 <span th:text="'Réduction de ' + ${bike.price.promo1} + '% à partir de 3 jours'"></span>
        </div>
        <div th:if="${bike.price != null and bike.price.promo2 != null}" class="text-muted small mb-2">
          🎉 <span th:text="'Réduction de ' + ${bike.price.promo2} + '% à partir de 7 jours'"></span>
        </div>

        <hr/>

        <p class="text-muted small mb-3">
          Propriétaire :
          <strong th:text="${bike.user != null ? bike.user.firstName + ' ' + bike.user.lastName : '—'}"></strong>
        </p>

        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
        <form th:action="@{/reservations}" method="post">
          <input type="hidden" name="bikeId" th:value="${bike.id}"/>
          <label class="form-label fw-semibold">Du</label>
          <input id="startDate" class="form-control mb-2" type="text" name="start"
                 placeholder="Choisir une date" autocomplete="off" required readonly/>
          <label class="form-label fw-semibold">Au</label>
          <input id="endDate" class="form-control mb-2" type="text" name="end"
                 placeholder="Choisir une date" autocomplete="off" required readonly/>
          <div class="d-flex gap-3 mb-3 small text-muted">
            <span><span class="legend-swatch legend-free"></span> Disponible</span>
            <span><span class="legend-swatch legend-booked"></span> Réservé</span>
          </div>
          <th:block sec:authorize="isAuthenticated()">
            <button class="btn text-white w-100 py-2 fw-bold"
                    style="background:#1fa67a;">Réserver ce vélo</button>
          </th:block>
          <th:block sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="btn btn-outline-secondary w-100 py-2">
              Se connecter pour réserver
            </a>
          </th:block>
        </form>
      </div>
    </div>

  </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

<!-- Galerie photos : navigation entre les photos (miniatures + flèches) -->
<script>
(function () {
  const main = document.getElementById('galleryMain');
  const thumbs = Array.from(document.querySelectorAll('.gallery-thumb'));
  const counter = document.getElementById('galleryCounter');
  if (!main || thumbs.length < 2) return;
  let idx = 0;
  function show(i) {
    idx = (i + thumbs.length) % thumbs.length;
    main.src = thumbs[idx].getAttribute('src');
    if (counter) counter.textContent = (idx + 1) + '/' + thumbs.length;
    thumbs.forEach((t, k) => t.style.borderColor = (k === idx) ? '#1fa67a' : 'transparent');
  }
  window.galleryStep = function (d) { show(idx + d); };
  window.gallerySelect = function (el) { show(parseInt(el.getAttribute('data-index'), 10)); };
  show(0);
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
<script th:inline="javascript">
  const reservedRanges = /*[[${reservedRanges}]]*/ [];
  const commonOpts = {
    minDate: "today",
    dateFormat: "Y-m-d",
    disable: reservedRanges,
    disableMobile: true,
    locale: (flatpickr.l10ns && flatpickr.l10ns.fr) ? "fr" : "default"
  };
  const endPicker = flatpickr("#endDate", commonOpts);
  flatpickr("#startDate", Object.assign({}, commonOpts, {
    onChange: function (selected) {
      if (selected[0]) endPicker.set("minDate", selected[0]);
    }
  }));
</script>
</body>
</html>
