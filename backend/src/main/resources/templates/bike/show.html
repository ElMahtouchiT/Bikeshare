<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title th:text="${bike.brand + ' ' + bike.model} + ' — BikeShare'">Détail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
  <a th:href="@{/}" class="text-decoration-none">&larr; Retour</a>
  <div class="row mt-3 g-4">
    <div class="col-md-7">
      <img class="img-fluid rounded-4 shadow-sm"
           th:src="${!bike.photos.isEmpty()} ? @{'/uploads/photo-bike/' + ${bike.photos[0].url}} : 'https://placehold.co/600x400?text=Velo'"/>
      <h2 class="mt-3" th:text="${bike.brand + ' ' + bike.model}"></h2>
      <p class="text-muted">
        <span th:text="${bike.category != null ? bike.category.category : ''}"></span> ·
        <span th:text="${bike.locality}"></span> ·
        <span th:text="'Note : ' + ${#numbers.formatDecimal(averageRating,1,1)} + '/5'"></span>
      </p>
      <h4>Caractéristiques</h4>
      <ul>
        <li>Type : <span th:text="${bike.bikeType}"></span></li>
        <li>Cadre : <span th:text="${bike.frameSize}"></span></li>
        <li>Roues : <span th:text="${bike.wheelSize}"></span></li>
        <li>Vitesses : <span th:text="${bike.gears}"></span></li>
        <li>Électrique : <span th:text="${bike.electric} ? 'Oui' : 'Non'"></span></li>
      </ul>
      <h4>Équipements</h4>
      <span class="badge bg-secondary me-1" th:each="e : ${bike.equipments}" th:text="${e.description}"></span>
      <h4 class="mt-4">Évaluations</h4>
      <div th:if="${evaluations.isEmpty()}" class="text-muted">Aucune évaluation.</div>
      <div th:each="e : ${evaluations}" class="border-bottom py-2">
        <strong th:text="${e.note} + '/5'"></strong>
        <p class="mb-0" th:text="${e.comment}"></p>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card shadow-sm border-0 rounded-4 p-3">
        <h3 th:text="${bike.price != null ? bike.price.middlePrice + ' €/jour' : ''}"></h3>
        <p class="text-muted">Propriétaire :
          <span th:text="${bike.user != null ? bike.user.firstName : ''}"></span></p>
        <form th:action="@{/reservations}" method="post">
          <input type="hidden" name="bikeId" th:value="${bike.id}"/>
          <label class="form-label">Du</label>
          <input class="form-control mb-2" type="date" name="start"
                 th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
          <label class="form-label">Au</label>
          <input class="form-control mb-3" type="date" name="end"
                 th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
          <button class="btn text-white w-100" style="background:#1fa67a;"
                  sec:authorize="isAuthenticated()">Réserver ce vélo</button>
          <a th:href="@{/login}" class="btn btn-outline-secondary w-100"
             sec:authorize="!isAuthenticated()">Se connecter pour réserver</a>
        </form>
      </div>
    </div>
  </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
