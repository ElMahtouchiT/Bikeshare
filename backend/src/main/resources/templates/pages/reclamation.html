<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Réclamation — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5" style="max-width:680px;">
  <h2 class="mb-3">Déposer une réclamation</h2>
  <p class="text-muted">Un problème avec une location, un paiement ou un membre ? Décrivez votre réclamation, nous la traiterons dans les meilleurs délais.</p>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <div class="card border-0 shadow-sm rounded-4 p-4">
    <form th:action="@{/reclamation}" method="post">
      <div class="mb-3">
        <label class="form-label">Objet <span class="text-danger">*</span></label>
        <input class="form-control" name="objet" required placeholder="Ex : Vélo non conforme à l'annonce"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Votre e-mail <span class="text-danger">*</span></label>
        <input class="form-control" type="email" name="email" required placeholder="vous@exemple.be"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Votre message <span class="text-danger">*</span></label>
        <textarea class="form-control" name="message" rows="5" required
                  placeholder="Décrivez votre réclamation le plus précisément possible…"></textarea>
      </div>
      <button class="btn text-white px-4" style="background:#1fa67a;">Envoyer la réclamation</button>
    </form>
  </div>

  <p class="text-muted small mt-3 mb-0">
    Vous pouvez aussi nous joindre via la page <a th:href="@{/contact}">Contact</a>.
  </p>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
