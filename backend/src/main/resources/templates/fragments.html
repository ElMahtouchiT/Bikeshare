<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/></head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark" style="background:#13233f;">
  <!-- Sticky footer : le pied de page reste toujours en bas, même sur les pages courtes -->
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    body > footer { margin-top: auto; }
  </style>
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">🚲 BikeShare</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <!-- Liens centre -->
      <ul class="navbar-nav me-auto ms-3 gap-1">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/bikes}" th:text="#{nav.catalogue}">Catalogue</a>
        </li>
        <li class="nav-item" sec:authorize="hasAuthority('ROLE_ADMIN')">
          <a class="nav-link text-warning fw-bold" th:href="@{/admin}"><span>⚙ </span><span th:text="#{nav.admin}">Administration</span></a>
        </li>
      </ul>

      <!-- Liens droite -->
      <div class="d-flex gap-2 align-items-center">

        <!-- Sélecteur de langue (liens simples : ?lang= conserve la page courante) -->
        <div class="d-flex gap-1 align-items-center me-2" title="Langue / Language / Taal">
          <span class="text-white-50">🌐</span>
          <a href="?lang=fr" class="small text-white text-decoration-none">FR</a>
          <span class="text-white-50 small">|</span>
          <a href="?lang=en" class="small text-white text-decoration-none">EN</a>
          <span class="text-white-50 small">|</span>
          <a href="?lang=nl" class="small text-white text-decoration-none">NL</a>
        </div>

        <!-- Visiteur non connecté -->
        <th:block sec:authorize="!isAuthenticated()">
          <a class="btn btn-outline-light btn-sm" th:href="@{/bikes}" th:text="#{nav.viewBikes}">Voir les vélos</a>
          <a class="btn btn-sm text-white" style="background:#1fa67a;" th:href="@{/login}" th:text="#{nav.login}">Se connecter</a>
          <a class="btn btn-sm btn-outline-light" th:href="@{/register}" th:text="#{nav.register}">S'inscrire</a>
        </th:block>

        <!-- Membre connecté (pas admin) -->
        <th:block sec:authorize="hasAuthority('ROLE_MEMBER') and !hasAuthority('ROLE_ADMIN')">
          <a class="btn btn-outline-light btn-sm" th:href="@{/account/bikes/create}" th:text="#{nav.proposeBike}">Proposer un vélo</a>
          <a class="btn btn-sm text-white" style="background:#1fa67a;" th:href="@{/account}" th:text="#{nav.account}">Mon compte</a>
          <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-sm btn-outline-light" th:text="#{nav.logout}">Déconnexion</button>
          </form>
        </th:block>

        <!-- Admin connecté -->
        <th:block sec:authorize="hasAuthority('ROLE_ADMIN')">
          <a class="btn btn-sm text-white" style="background:#1fa67a;" th:href="@{/account}" th:text="#{nav.account}">Mon compte</a>
          <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-sm btn-outline-light" th:text="#{nav.logout}">Déconnexion</button>
          </form>
        </th:block>

      </div>
    </div>
  </div>
</nav>
<footer th:fragment="footer" class="text-white pt-4 pb-3" style="background:#13233f;">
  <div class="container">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
      <span class="small">🚲 <span th:text="#{footer.tagline}">BikeShare — Plateforme de location de vélos entre particuliers</span></span>
      <nav class="d-flex flex-wrap gap-3 small">
        <a class="text-white-50 text-decoration-none" th:href="@{/contact}" th:text="#{footer.contact}">Contact</a>
        <a class="text-white-50 text-decoration-none" th:href="@{/conditions}" th:text="#{footer.conditions}">Conditions de location</a>
        <a class="text-white-50 text-decoration-none" th:href="@{/mentions-legales}" th:text="#{footer.legal}">Mentions légales</a>
        <a class="text-white-50 text-decoration-none" th:href="@{/reclamation}" th:text="#{footer.claim}">Réclamation</a>
      </nav>
    </div>
    <hr class="border-secondary my-3"/>
    <div class="text-center text-white-50 small">
      © <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> BikeShare
    </div>
  </div>
</footer>
</body>
</html>
