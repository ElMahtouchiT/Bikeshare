<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Connexion — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/></head>
<body class="bg-light">
<div class="container" style="max-width:420px;margin-top:8vh">
  <div class="card shadow-sm border-0 rounded-4 p-4">
    <h3 class="mb-3">Connexion</h3>
    <div th:if="${param.registered}" class="alert alert-success py-2">Compte créé, connectez-vous.</div>
    <div th:if="${param.error}" class="alert alert-danger py-2">Identifiants invalides.</div>
    <form th:action="@{/login}" method="post">
      <label class="form-label">Email</label><input class="form-control mb-2" name="username" type="email"/>
      <label class="form-label">Mot de passe</label><input class="form-control mb-3" name="password" type="password"/>
      <button class="btn text-white w-100" style="background:#1fa67a;">Se connecter</button>
    </form>
    <p class="text-center mt-3 mb-0">Pas de compte ? <a th:href="@{/register}">Créer un compte</a></p>
  </div>
</div>
</body>
</html>
