<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{pwd.resetTitle} + ' — BikeShare'">Nouveau mot de passe — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container" style="max-width:440px;margin-top:8vh">
  <div class="card shadow-sm border-0 rounded-4 p-4">
    <h3 class="mb-3" th:text="#{pwd.resetTitle}">Nouveau mot de passe</h3>

    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <div th:unless="${valid}">
      <div class="alert alert-danger py-2" th:text="#{pwd.invalidLink}">Lien invalide ou expiré.</div>
      <a th:href="@{/forgot-password}" class="btn btn-outline-secondary w-100" th:text="#{pwd.forgotLink}">Mot de passe oublié ?</a>
    </div>

    <form th:if="${valid}" th:action="@{/reset-password}" method="post">
      <input type="hidden" name="token" th:value="${token}"/>
      <label class="form-label" th:text="#{pwd.newPassword}">Nouveau mot de passe</label>
      <input class="form-control mb-3" type="password" name="password" minlength="8" required/>
      <button class="btn text-white w-100" style="background:#1fa67a;" th:text="#{pwd.reset}">Réinitialiser le mot de passe</button>
    </form>
  </div>
</div>
</body>
</html>
