<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{pwd.forgotTitle} + ' — BikeShare'">Mot de passe oublié — BikeShare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container" style="max-width:440px;margin-top:8vh">
  <div class="card shadow-sm border-0 rounded-4 p-4">
    <h3 class="mb-3" th:text="#{pwd.forgotTitle}">Mot de passe oublié</h3>

    <div th:if="${submitted}">
      <div class="alert alert-success py-2" th:text="#{pwd.sent}">Si un compte existe pour cet email, un lien de réinitialisation a été envoyé.</div>
      <!-- Mode démo : lien affiché à l'écran si app.password-reset.expose-link=true -->
      <div th:if="${resetLink}" class="alert alert-info py-2 small">
        <strong>Mode démo</strong> — lien de réinitialisation :
        <a th:href="${resetLink}" th:text="${resetLink}" class="d-block text-break">lien</a>
      </div>
      <a th:href="@{/login}" class="btn btn-outline-secondary w-100 mt-2" th:text="#{login.title}">Connexion</a>
    </div>

    <form th:unless="${submitted}" th:action="@{/forgot-password}" method="post">
      <p class="text-muted small" th:text="#{pwd.forgotIntro}">Entrez votre email pour recevoir un lien de réinitialisation.</p>
      <label class="form-label" th:text="#{login.email}">Email</label>
      <input class="form-control mb-3" type="email" name="email" required/>
      <button class="btn text-white w-100" style="background:#1fa67a;" th:text="#{pwd.send}">Envoyer le lien</button>
      <p class="text-center mt-3 mb-0"><a th:href="@{/login}" th:text="#{login.title}">Connexion</a></p>
    </form>
  </div>
</div>
</body>
</html>
