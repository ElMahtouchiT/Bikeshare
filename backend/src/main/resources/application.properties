# ===== BikeShare — Configuration =====
spring.application.name=BikeShare

# --- Base de données MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/bikeshare?useSSL=false&serverTimezone=Europe/Brussels
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Upload de fichiers (photos de vélos, documents) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Email (vérification de compte, notifications) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Stripe (paiements) ---
stripe.api.key=sk_test_your_stripe_key
stripe.webhook.secret=whsec_your_webhook_secret

# --- Google Maps (géolocalisation des vélos) ---
google.maps.api.key=AIzaSyCpLVkry24UyzhR3DS_JBeP6oVnJoJTJJI

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
