# ===== BikeShare — Configuration =====
# Les valeurs ${VAR:defaut} utilisent la variable d'environnement VAR si elle existe,
# sinon la valeur par défaut (développement local). En production (Railway), on
# définit ces variables ; en local, rien à changer.
spring.application.name=BikeShare

# --- Serveur (le port est fourni par l'hébergeur en production) ---
server.port=${PORT:8080}
# Derrière un proxy TLS (Railway) : respecter X-Forwarded-* (schéma https), ce qui
# corrige l'origine vue par l'app (handshake WebSocket) et les redirections (login).
server.forward-headers-strategy=framework

# --- Mot de passe oublié ---
# Mode démo : afficher le lien de réinitialisation à l'écran (utile si le SMTP n'est pas
# configuré, ex. sur Railway sans identifiants Gmail). À laisser false en production réelle.
app.password-reset.expose-link=${PASSWORD_RESET_EXPOSE_LINK:false}

# --- Base de données MySQL ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bikeshare?useSSL=false&serverTimezone=Europe/Brussels}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Internationalisation (messages) ---
# Le français est dans le fichier par défaut messages.properties (pas de messages_fr).
# Sans cette ligne, demander la locale "fr" (sans fichier dédié) fait retomber Spring
# sur la locale SYSTÈME du serveur — anglais sur le conteneur Linux de Railway — au
# lieu du fichier par défaut. On force donc le repli vers messages.properties (FR).
spring.messages.fallback-to-system-locale=false
spring.messages.encoding=UTF-8

# --- Thymeleaf ---
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
# Bufferise toute la page avant de l'envoyer : évite "Cannot create a session after
# the response has been committed" lors de l'ajout du token CSRF sur les pages longues.
spring.thymeleaf.servlet.produce-partial-output-while-processing=false

# --- Upload de fichiers (photos de vélos, documents) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Email (vérification de compte, notifications) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Timeouts SMTP : éviter qu'une connexion bloquée ne traîne (5 s max par étape).
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Stripe (paiements) ---
stripe.api.key=${STRIPE_API_KEY:sk_test_your_stripe_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

# --- Google Maps (géolocalisation des vélos) ---
google.maps.api.key=${GOOGLE_MAPS_API_KEY:AIzaSyCpLVkry24UyzhR3DS_JBeP6oVnJoJTJJI}

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
